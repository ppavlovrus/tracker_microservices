<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Tracker{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">📋 Task Tracker</h1>
            <ul class="nav-links">
                <li><a href="/">Главная</a></li>
                <li><a href="/web/tasks">Задачи</a></li>
                <li><a href="/docs" target="_blank">API Docs</a></li>
                <li id="auth-nav"></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Task Tracker Microservices</p>
        </div>
    </footer>

    <script src="/static/js/app.js?v=3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
