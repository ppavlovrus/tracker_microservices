{% extends "base.html" %}

{% block title %}Вход - Task Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Вход в систему</h2>
</div>

<div class="card" style="max-width: 420px; margin: 0 auto;">
    <form id="login-form" onsubmit="submitLogin(event)">
        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" class="input" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="input" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Войти</button>
        </div>
    </form>
    <p style="margin-top: 1rem; color: #6b7280; font-size: 0.875rem;">
        По умолчанию: <code>admin</code> / <code>admin</code>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    // If already logged in, skip the form.
    document.addEventListener('DOMContentLoaded', async () => {
        const user = await loadCurrentUser();
        if (user) window.location.href = '/web/tasks';
    });

    async function submitLogin(event) {
        event.preventDefault();
        const form = event.target;
        const body = {
            username: form.username.value,
            password: form.password.value,
        };
        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(body),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Не удалось войти');
            }
            showNotification('Вход выполнен');
            window.location.href = '/web/tasks';
        } catch (error) {
            handleApiError(error);
        }
    }
</script>
{% endblock %}
