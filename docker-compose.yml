---
services:
  postgres:
    image:
      postgres:16
    environment:
      - POSTGRES_DB=task_tracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwerty
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: common/Dockerfile
    environment:
      - DATABASE_NAME=task_tracker
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=qwerty
      - DATABASE_HOST=postgres
    depends_on: { postgres: { condition: service_healthy } }

  tasks:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
    environment:
      - DB_NAME=task_tracker
      - DB_HOST=postgres
      - AMQP_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    environment:
      - DB_NAME=task_tracker
      - DB_HOST=postgres
      - AMQP_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  comments:
    build:
      context: .
      dockerfile: services/comments/Dockerfile
    environment:
      - DB_NAME=task_tracker
      - DB_HOST=postgres
      - AMQP_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  tags:
    build:
      context: .
      dockerfile: services/tags/Dockerfile
    environment:
      - DB_NAME=task_tracker
      - DB_HOST=postgres
      - AMQP_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  attachments:
    build:
      context: .
      dockerfile: services/attachments/Dockerfile
    environment:
      - DB_NAME=task_tracker
      - DB_HOST=postgres
      - AMQP_URL=amqp://guest:guest@rabbitmq/
      - S3_ENDPOINT_INTERNAL=http://minio:9000
      - S3_ENDPOINT_PUBLIC=http://localhost:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=attachments
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      minio:
        condition: service_started

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  rabbitmq:
    ports:
      - 15672:15672
      - 5672:5672
    image:
      rabbitmq:3-management
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq/
      - REDIS_URL=redis://redis:6379/0
      - METRICS_ENABLED=true
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      tasks:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pgdata:
  miniodata:
  redisdata:
  promdata:
  grafanadata:


